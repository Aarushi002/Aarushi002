<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 220" role="img" aria-label="Animated tech banner">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="scan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22d3ee;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#f472b6;stop-opacity:0"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#334155" stroke-width="0.5" opacity="0.35"/>
    </pattern>
    <clipPath id="clip">
      <rect width="900" height="220"/>
    </clipPath>
  </defs>
  <rect width="900" height="220" fill="url(#bg)"/>
  <rect width="900" height="220" fill="url(#grid)"/>
  <g clip-path="url(#clip)">
    <rect x="-200" y="102" width="260" height="6" fill="url(#scan)" opacity="0.75" rx="3">
      <animate attributeName="x" from="-260" to="900" dur="6s" repeatCount="indefinite"/>
    </rect>
  </g>
  <g fill="none" stroke="#64748b" stroke-width="1.2" opacity="0.5">
    <path d="M40 60 L55 60 55 160 40 160">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="5s" repeatCount="indefinite"/>
    </path>
    <path d="M860 60 L845 60 845 160 860 160">
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,6; 0,0" dur="5.5s" repeatCount="indefinite"/>
    </path>
  </g>
  <g fill="#22d3ee">
    <circle r="3" cx="120" cy="40">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="2.5" cx="780" cy="180" fill="#a78bfa">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/>
    </circle>
    <circle r="2" cx="700" cy="35" fill="#f472b6">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2.8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="450" y="100" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="13" fill="#94a3b8">
    <animate attributeName="opacity" values="0.35;0.9;0.35" dur="4s" repeatCount="indefinite"/>
    build(ideas) &#8594; innovate(stack) &#8594; deliver(impact);
  </text>
  <text x="450" y="145" text-anchor="middle" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="28" font-weight="700" fill="#f8fafc">
    Aarushi Krishna
  </text>
  <text x="450" y="178" text-anchor="middle" font-family="system-ui, Segoe UI, Roboto, sans-serif" font-size="14" fill="#94a3b8">
    Software Developer &#183; Startup &#183; Tech Solutions
  </text>
</svg>
